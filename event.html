<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>活動詳情｜北回歸線 TNMNEWS</title>
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/tn-logo-32x32.png">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tailwindcss/typography@0.5.9/dist/typography.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to bottom, #0B1C3D, #112B4D);
      color: #FFFFFF;
      font-family: 'Noto Sans TC', sans-serif;
    }
    .gradient-text {
      background: linear-gradient(90deg, #00C9A7, #FFD95A, #FF6CAB, #00C9A7);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientMove 8s ease infinite;
      font-weight: 700; 
    }
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* 16:9 響應式大圖容器 */
    .aspect-16-9 {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 56.25%;
    }
    .aspect-16-9 img {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
    }
    /* 覆蓋 Typography 明亮樣式 */
    .prose h1, .prose h2, .prose h3 {
      color: #FFD95A !important;
      font-weight: bold;
      margin-top: 2rem;
      margin-bottom: 1rem;
    }
    .prose p {
      color: #E5E7EB !important;
      line-height: 1.8;
      margin-bottom: 1.25rem;
    }
    .prose a {
      color: #00C9A7 !important;
      text-decoration: underline;
    }
    .prose strong {
      color: #FFD95A !important;
    }
    .prose blockquote {
      border-left-color: #00C9A7 !important;
      color: #9CA3AF !important;
      background-color: rgba(11, 28, 61, 0.6);
      padding: 1rem;
      border-radius: 0.375rem;
    }
  </style>
</head>
  <!-- 我不知道你想幹嘛，但這不是你該來的地方 -->
  <!-- 反正我已經盡力維護這網站了(雖然一堆屎山代碼) -->
  <!-- 我不覺得這程式是有甚麼好參考的，但如果對你有用就拿去吧!By.王吉米JimmyWang -->
<body class="flex flex-col min-h-screen pt-24 px-4">

  <nav class="bg-[#112B4D] bg-opacity-90 backdrop-blur-lg p-4 fixed w-full top-0 z-50 shadow">
    <div class="container mx-auto flex justify-between items-center">
      <a href="index.html" class="text-2xl font-bold gradient-text">北回歸線 TNMNEWS</a>
      <ul class="flex gap-6 text-sm items-center text-white">
        <li><a href="index.html" class="hover:text-[#FFD95A] transition">主頁</a></li>
        <li><a href="news.html" class="hover:text-[#FFD95A] transition">最新新聞</a></li>
        <li><a href="events.html" class="hover:text-[#FFD95A] transition">所有活動</a></li>
        <li><a href="about-tnm.html" class="hover:text-[#FFD95A] transition">關於北回歸線</a></li>
        <li><a href="about-youthfront.html" class="hover:text-[#FFD95A] transition">關於青權陣線</a></li>
        <li><a href="links.html" class="hover:text-[#FFD95A] transition">更多連結</a></li>
      </ul>
    </div>
  </nav>

  <main class="max-w-3xl w-full mx-auto flex-grow mt-6">
    
    <h1 class="text-3xl md:text-4xl font-black text-white leading-tight mb-6" id="title">載入中...</h1>

    <div id="image-wrapper" class="w-full rounded-lg overflow-hidden border border-[#1A2F4D] shadow-lg mb-4 bg-[#0B1C3D] hidden">
      <div class="aspect-16-9">
        <img id="event-image" src="" alt="活動精選圖片">
      </div>
    </div>

    <div class="flex flex-wrap items-center justify-between text-sm text-gray-400 border-b border-[#1A2F4D] pb-4 mb-6">
      <div id="meta"></div>
      <div class="flex gap-4 text-xs mt-2 md:mt-0">
        <a id="link-instagram" href="#" target="_blank" class="text-[#00C9A7] hover:underline hidden">Instagram 貼文</a>
        <a id="link-threads" href="#" target="_blank" class="text-[#00C9A7] hover:underline hidden">Threads 討論</a>
      </div>
    </div>

    <div id="content" class="prose prose-invert prose-lg max-w-none leading-relaxed text-justify mb-12"></div>

    <div class="w-full mb-8">
      <img src="./assets/20250515.png" alt="北回歸線 TNMNEWS" class="w-full h-auto rounded border border-[#1A2F4D] shadow-lg mx-auto">
    </div>

    <div class="text-center mb-16">
      <a href="events.html" class="inline-block px-6 py-2 border border-[#FFD95A] text-[#FFD95A] rounded hover:bg-[#FFD95A] hover:text-[#0B1C3D] transition text-sm font-semibold">
        返回所有活動
      </a>
    </div>

  </main>

  <footer class="bg-[#0B1C3D] py-12 px-6 border-t border-[#1A2F4D] text-sm text-gray-300 w-full text-center">
    © 2026 北回歸線 TNMNEWS. 保留所有權利。
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    //平行 Fetch 活動索引與 Markdown 檔案
    Promise.all([
      fetch('events-index.json').then(res => res.json()),
      fetch(`events/${filename_fallback(id)}.md`).then(res => res.text())
    ])
    .then(([indexData, mdText]) => {
      
      // 1. 除 Markdown 頂部可能存在的 Front Matter 並渲染內文
      const cleanedMd = mdText.replace(/^---\n[\s\S]*?\n---/, '').trim();
      document.getElementById('content').innerHTML = marked.parse(cleanedMd);

      // 2.從資料庫地圖中比對查閱本活動的後設資料
      const currentEvent = indexData.find(item => item.id === id);
      
      if (currentEvent) {
        document.getElementById('title').textContent = currentEvent.title;
        document.getElementById('meta').textContent = `活動日期：${currentEvent.date} ｜ 主辦單位：${currentEvent.organizer || '北回歸線 TNMNEWS'}`;
        
        // 3.雙重相容性大圖追蹤：同時支援 JSON 中定義為 image 或 thumbnail 的路徑
        const eventImgSrc = currentEvent.image || currentEvent.thumbnail;
        if (eventImgSrc) {
          document.getElementById('event-image').src = eventImgSrc;
          document.getElementById('image-wrapper').classList.remove('hidden');
        }

        // 4.社群貼文衍生連結對齊
        const igLink = document.getElementById('link-instagram');
        const threadsLink = document.getElementById('link-threads');
        
        if (currentEvent.instagram_url) {
          igLink.href = currentEvent.instagram_url;
          igLink.classList.remove('hidden');
        }
        if (currentEvent.threads_url) {
          threadsLink.href = currentEvent.threads_url;
          threadsLink.classList.remove('hidden');
        }
      }
    })
    .catch(err => {
      document.getElementById('title').textContent = '找不到活動';
      document.getElementById('content').innerHTML = '<p class="text-red-400 text-center py-8">抱歉，無法讀取活動詳情，請確認連結是否正確或檔案是否存在。</p>';
      console.error("活動內文解析錯誤:", err);
    });

    // 解碼安全機制
    function filename_fallback(urlId) {
      return urlId ? decodeURIComponent(urlId) : 'error';
    }
  </script>

</body>
</html>
